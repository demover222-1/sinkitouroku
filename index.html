<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お客様情報登録フォーム</title>
</head>

<body>

<div id="form-page" class="page active">
  <h2 class="page-title">お客様情報登録フォーム</h2>
  <form id="customer-form">
    <label for="firstName">氏名</label>
    <input type="text" id="firstName" name="firstName" placeholder="山田 太郎" required />

    <label for="fullName">フルネーム</label>
    <input type="text" id="fullName" name="fullName" placeholder="ヤマダ タロウ" required />

    <label for="phone">電話番号</label>
    <input type="tel" id="phone" name="phone" pattern="[0-9\-]+" placeholder="090-1234-5678" required />



    <button type="submit">送信</button>
  </form>
  <div id="error-message">送信できませんでした。もう一度お試しください。</div>
</div>

<div id="completion-page">
  登録が完了しました！<br>ご予約の方はメニューボタンから<br>「予約する」を選択してください。
</div>

<script>

const errorMessage = document.getElementById("error-message");
const formPage = document.getElementById("form-page");
const completionPage = document.getElementById("completion-page");
// URLパラメータからuserIdを取得
window.onload = function() {
const form = document.getElementById("customer-form"); 
const params = new URLSearchParams(window.location.search);
const userId = params.get("userId");
const webappurl = params.get("webappurl");

const cssFile = params.get("css"); // URLパラメータで指定されたCSSファイル名
if (cssFile) {
const link = document.createElement("link");
link.rel = "stylesheet";
link.href = cssFile; // 同じフォルダにある cssFile を読み込む
document.head.appendChild(link);
} else {
  // デフォルト CSS
const link = document.createElement("link");
link.rel = "stylesheet";
link.href = "style.css";
document.head.appendChild(link);
}

  
    const root = document.documentElement;

  // 文字色
	if (params.get('bodyColor')) root.style.setProperty('--color-body', params.get('bodyColor'));
	if (params.get('inputButtonColor')) root.style.setProperty('--color-input-button', params.get('inputButtonColor'));
	if (params.get('labelColor')) root.style.setProperty('--color-label', params.get('labelColor'));
	if (params.get('buttonTextColor')) root.style.setProperty('--color-button-text', params.get('buttonTextColor'));
	if (params.get('pageTitleColor')) root.style.setProperty('--color-page-title', params.get('pageTitleColor'));

  // 背景
	if (params.get('bodyBg')) root.style.setProperty('--bg-body', params.get('bodyBg'));
	if (params.get('buttonBg')) root.style.setProperty('--bg-button', params.get('buttonBg'));
	if (params.get('buttonHoverBg')) root.style.setProperty('--bg-button-hover', params.get('buttonHoverBg'));
	if (params.get('formBg')) root.style.setProperty('--form-bg', params.get('formBg'));
	if (params.get('inputBg')) root.style.setProperty('--input-bg', params.get('inputBg'));

  // 枠線（フォーカス時）
    if (params.get('inputFocusBorder')) root.style.setProperty('--border-input-focus', params.get('inputFocusBorder'));
  








//===============送信に関して=================================================================================
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorMessage.style.display = "none";

  const submitBtn = form.querySelector("button");

  // 連打防止
  submitBtn.disabled = true;
  submitBtn.textContent = "送信中...";

  //送信ボタンについて
  const formData = new FormData(form);
  const data = {
    sinkitouroku: true,
    webappurl: webappurl,
    userId: userId,
    firstName: formData.get("firstName"),
    fullName: formData.get("fullName"),
    phone: formData.get("phone")
  };

  // ======= ここで即完了画面表示 =======
  formPage.classList.remove("active");
  completionPage.style.height = window.innerHeight + "px";
  completionPage.style.display = "flex";

  // ======= GAS へ非同期送信 =======
  try {
  await fetch("https://reservations.thinklayer.jp/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  } catch(err) {
    console.error("予期せぬエラー:", err);
    errorMessage.style.display = "block";
  }

});
};
</script>
</body>
</html>
